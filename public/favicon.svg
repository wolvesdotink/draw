<?xml version="1.0" encoding="UTF-8"?>
<!--
  draw app icon.

  Brutalist drafting mark. Pure flat black and white. No gradients,
  shadows, or decoration. The mark IS the act: a stark white nib pen
  striking down across a solid black squircle, and one decisive
  horizontal stroke extending from where the tip lands.

  This is the same nib silhouette used by NibIcon in the in-app file
  tree (src/components/icons.tsx). The app icon, file row icon, and
  product identity are all the same mark at different scales.

  Canvas:  1024 by 1024 master.
  Shape :  macOS Big Sur squircle, full bleed. Confrontational by
           design. Sits in the dock without apologizing for itself.
  Palette: pure #000 and pure #fff. Nothing else.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" shape-rendering="geometricPrecision">
  <path
    d="M 512 0
       C 128 0   0 128   0 512
       C 0 896   128 1024   512 1024
       C 896 1024   1024 896   1024 512
       C 1024 128   896 0   512 0 Z"
    fill="#000000"/>
  <g transform="translate(512 512) rotate(45)">
    <path d="M -320 -75 L 120 -75 L 290 0 L 120 75 L -320 75 Z" fill="#FFFFFF"/>
    <rect x="-240" y="-7" width="440" height="14" fill="#000000"/>
    <path d="M -320 -75 L -260 -30 L -260 30 L -320 75 Z" fill="#000000"/>
    <circle cx="285" cy="0" r="9" fill="#000000"/>
  </g>
  <rect x="722" y="688" width="220" height="60" fill="#FFFFFF"/>
</svg>
